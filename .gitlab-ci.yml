image: python:3.12

before_script:
  # Required for pyside to work with pylint in a pipeline
  - apt update
  - apt install -y libgl1-mesa-glx libegl1 libxkbcommon-dev dbus
  - python -m pip install --upgrade pip
  - pip install pipenv
  - pipenv sync

stages:
  - Static Analysis
  - Test

mypy:
  stage: Static Analysis
  allow_failure: true # Warnings are ignored by the pipeline. Consider changing this everywhere
  script:
    - pipenv run mypy .

pylint:
  stage: Static Analysis
  allow_failure: true
  script:
    #  Runs pylint in a way that always succeeds but generates a code quality report in a format accepted by gitlab so it displays in MRs.
    - pipenv run pylint --exit-zero --output-format=text -d C0116 project/ | tee /tmp/pylint.txt
    - pipenv run pylint --exit-zero --load-plugins=pylint_gitlab --output-format=gitlab-codeclimate project/ > codeclimate.json
  artifacts:
    expire_in: 7 days
    reports:
      codequality: codeclimate.json

tests:
  stage: Test
  allow_failure: true
  script:
    - pipenv run coverage run
    - pipenv run coverage report
    - pipenv run coverage xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    expire_in: 7 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
